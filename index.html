<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>サポートページ｜ExcelとPythonで実践する　金融データ分析入門</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
                   "Yu Gothic", "Meiryo", sans-serif;
      background: #f3f3f3;
      color: #222;
      line-height: 1.8;
    }

    .container {
      max-width: 1200px;
      margin: 56px auto;
      padding: 0 32px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 64px;
      align-items: start;
    }

    .book-image img {
      width: 100%;
      height: auto;
      display: block;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
    }

    .content h1 {
      margin: 0 0 16px 0;
      font-size: 2rem;
      font-weight: 700;
    }

    .content p {
      margin: 0 0 24px 0;
      font-size: 1rem;
      color: #444;
    }

    .download-box {
      background: #fff;
      border: 1px solid #d6d6d6;
      border-radius: 6px;
      padding: 28px 32px;
    }

    .download-box ul {
      margin: 0;
      padding-left: 1.2em;
    }

    .download-box li {
      margin: 0;
    }

    .download-box a {
      color: #145ca8;
      text-decoration: none;
      font-weight: 700;
    }

    .download-box a:hover {
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .book-image {
        max-width: 320px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="book-image">
        <a href="https://www.kspub.co.jp/book/detail/5433812.html" target="_blank" rel="noopener noreferrer">
          <img src="book_RGB.jpg" alt="『ExcelとPythonで実践する　金融データ分析入門』書影">
        </a>
    </div>

    <div class="content">
      <h1>『ExcelとPythonで実践する　金融データ分析入門』サポートページ</h1>
      <p>本書で用いるデータは以下からダウンロードできます。</p>

      <div class="download-box">
        <ul>
          <li><a href="https://github.com/ks-supportpage/financial-data-analysis-book/releases/download/v1.0/financial-data-analysis-book_ver1.0.zip">サンプルデータ</a></li>
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
